<svg width="1400" height="640" viewBox="0 0 1400 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="700" y1="0" x2="700" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F3EB"/>
      <stop offset="1" stop-color="#F0E6D9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#8A715B"/>
