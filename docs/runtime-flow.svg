  <text x="920" y="190" fill="#214237" font-family="Georgia, serif" font-size="22" font-weight="700">Registry + Processor</text>
  <text x="920" y="216" fill="#617068" font-family="Georgia, serif" font-size="14">Picks detectors and runs them</text>

  <rect x="1160" y="150" width="168" height="92" rx="18" fill="#FFFDF9" stroke="#D9CDBE"/>
  <text x="1192" y="190" fill="#214237" font-family="Georgia, serif" font-size="22" font-weight="700">Detectors</text>
  <text x="1192" y="216" fill="#617068" font-family="Georgia, serif" font-size="14">Black and blur logic</text>

