  <text x="598" y="412" fill="#617068" font-family="Georgia, serif" font-size="14">CSV metrics and per-session snapshots</text>
  <text x="598" y="434" fill="#617068" font-family="Georgia, serif" font-size="14">results.jsonl, alerts.jsonl, progress.json</text>

  <rect x="892" y="344" width="340" height="110" rx="18" fill="#FFFDF9" stroke="#D9CDBE"/>
