  <text x="272" y="386" fill="#214237" font-family="Georgia, serif" font-size="24" font-weight="700">Alert Rules</text>
  <text x="272" y="412" fill="#617068" font-family="Georgia, serif" font-size="14">Turn detector facts into alerts</text>
  <text x="272" y="434" fill="#617068" font-family="Georgia, serif" font-size="14">Immediate and rolling-window logic</text>

