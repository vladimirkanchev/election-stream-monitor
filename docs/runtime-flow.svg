  <line x1="508" y1="398" x2="566" y2="398" stroke="#8A715B" stroke-width="3" marker-end="url(#arrow)"/>

  <line x1="1062" y1="454" x2="1062" y2="530" stroke="#8A715B" stroke-width="3"/>
  <line x1="1062" y1="530" x2="454" y2="530" stroke="#8A715B" stroke-width="3"/>
