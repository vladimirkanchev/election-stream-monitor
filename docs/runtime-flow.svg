  <rect width="1400" height="640" rx="28" fill="url(#bg)"/>

  <text x="72" y="66" fill="#214237" font-family="Georgia, serif" font-size="32" font-weight="700">Election Stream Monitor Runtime Flow</text>
  <text x="72" y="98" fill="#6B756E" font-family="Georgia, serif" font-size="16">Simple view of how source setup, session execution, detector logic, and alerts connect today.</text>

  <rect x="72" y="150" width="220" height="92" rx="18" fill="#FFFDF9" stroke="#D9CDBE"/>
  <text x="104" y="190" fill="#214237" font-family="Georgia, serif" font-size="22" font-weight="700">Frontend Setup</text>
  <text x="104" y="216" fill="#617068" font-family="Georgia, serif" font-size="14">Mode, path, detector choice</text>

  <rect x="344" y="150" width="220" height="92" rx="18" fill="#FFFDF9" stroke="#D9CDBE"/>
  <text x="376" y="190" fill="#214237" font-family="Georgia, serif" font-size="22" font-weight="700">Electron Bridge</text>
  <text x="376" y="216" fill="#617068" font-family="Georgia, serif" font-size="14">Starts sessions, serves media</text>

  <rect x="616" y="150" width="220" height="92" rx="18" fill="#FFFDF9" stroke="#D9CDBE"/>
  <text x="648" y="190" fill="#214237" font-family="Georgia, serif" font-size="22" font-weight="700">Session Runner</text>
