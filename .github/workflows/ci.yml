name: CI

on:
  pull_request:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-24.04

    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docs: ${{ steps.filter.outputs.docs }}
      workflow: ${{ steps.filter.outputs.workflow }}
      contract: ${{ steps.filter.outputs.contract }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            backend:
              - 'src/**'
              - 'tests/**'
            frontend:
              - 'frontend/**'
            docs:
              - 'docs/**'
              - 'README.md'
              - 'frontend/README.md'
            workflow:
              - '.github/workflows/**'
              - '.github/scripts/**'
              - 'frontend/package.json'
              - 'pyproject.toml'
            contract:
              - 'src/source_validation.py'
              - 'src/session_io.py'
              - 'src/session_models.py'
              - 'src/alert_rules.py'
              - 'src/stream_loader_contracts.py'
              - 'src/api/routers/sessions.py'
              - 'src/api/schemas.py'
              - 'frontend/src/bridge/**'
              - 'frontend/src/types.ts'

  main-pr-consistency:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run main PR consistency checks
        run: python .github/scripts/check_main_pr_consistency.py origin/${{ github.base_ref }}...HEAD

  frontend-checkpoint:
    runs-on: ubuntu-24.04
    needs:
      - changes

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.contract == 'true' || (github.event_name == 'pull_request' && github.base_ref == 'main')
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install frontend dependencies
        if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.contract == 'true' || (github.event_name == 'pull_request' && github.base_ref == 'main')
        working-directory: frontend
        run: npm ci

      - name: Run frontend checkpoint
        if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.contract == 'true' || (github.event_name == 'pull_request' && github.base_ref == 'main')
        working-directory: frontend
        run: npm run test:frontend-checkpoint

      - name: Skip frontend checkpoint
        if: needs.changes.outputs.frontend != 'true' && needs.changes.outputs.backend != 'true' && needs.changes.outputs.contract != 'true' && !(github.event_name == 'pull_request' && github.base_ref == 'main')
        run: echo "No frontend, backend, or contract changes detected; skipping frontend checkpoint."

  backend-tests:
    runs-on: ubuntu-24.04
    needs:
      - changes

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.contract == 'true' || (github.event_name == 'pull_request' && github.base_ref == 'main')
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg=7:6.1.1-3ubuntu5

      - name: Show ffmpeg version
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.contract == 'true' || (github.event_name == 'pull_request' && github.base_ref == 'main')
        run: ffmpeg -version | head -n 1

      - name: Run editable-install packaging check
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.contract == 'true' || (github.event_name == 'pull_request' && github.base_ref == 'main')
        run: |
          python -m venv /tmp/esm-packaging-check
          /tmp/esm-packaging-check/bin/python -m pip install --upgrade pip setuptools wheel
          /tmp/esm-packaging-check/bin/python -m pip install --no-deps --no-build-isolation -e .

      - name: Install Python dependencies
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.contract == 'true' || (github.event_name == 'pull_request' && github.base_ref == 'main')
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]

      - name: Run packaging smoke check
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.contract == 'true' || (github.event_name == 'pull_request' && github.base_ref == 'main')
        run: |
          python -c "import api.app, api.routers.sessions, session_service, session_cli"

      - name: Run backend tests
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.contract == 'true' || (github.event_name == 'pull_request' && github.base_ref == 'main')
        run: |
          mkdir -p ci-artifacts
          set -o pipefail
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q 2>&1 | tee ci-artifacts/backend-tests.log

      - name: Skip backend tests
        if: needs.changes.outputs.backend != 'true' && needs.changes.outputs.contract != 'true' && !(github.event_name == 'pull_request' && github.base_ref == 'main')
        run: echo "No backend or contract changes detected; skipping backend tests."

      - name: Upload backend test log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-tests-${{ github.run_id }}
          path: ci-artifacts/backend-tests.log
          retention-days: 7

  backend-ruff:
    runs-on: ubuntu-24.04
    needs:
      - changes

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python lint dependencies
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.contract == 'true' || (github.event_name == 'pull_request' && github.base_ref == 'main')
        run: |
          python -m pip install --upgrade pip
          pip install -e .[lint]

      - name: Run backend Ruff lint
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.contract == 'true' || (github.event_name == 'pull_request' && github.base_ref == 'main')
        run: ruff check src tests

      - name: Skip backend Ruff lint
        if: needs.changes.outputs.backend != 'true' && needs.changes.outputs.contract != 'true' && !(github.event_name == 'pull_request' && github.base_ref == 'main')
        run: echo "No backend or contract changes detected; skipping backend Ruff lint."

  frontend-typecheck:
    runs-on: ubuntu-24.04
    needs:
      - changes

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.contract == 'true' || (github.event_name == 'pull_request' && github.base_ref == 'main')
        working-directory: frontend
        run: npm ci

      - name: Run frontend typecheck
        if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.contract == 'true' || (github.event_name == 'pull_request' && github.base_ref == 'main')
        working-directory: frontend
        run: npm run typecheck

      - name: Skip frontend typecheck
        if: needs.changes.outputs.frontend != 'true' && needs.changes.outputs.contract != 'true' && !(github.event_name == 'pull_request' && github.base_ref == 'main')
        run: echo "No frontend or contract changes detected; skipping frontend typecheck."

  frontend-lint:
    runs-on: ubuntu-24.04
    continue-on-error: true
    needs:
      - changes

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.contract == 'true' || (github.event_name == 'pull_request' && github.base_ref == 'main')
        working-directory: frontend
        run: npm ci

      - name: Run frontend lint
        if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.contract == 'true' || (github.event_name == 'pull_request' && github.base_ref == 'main')
        working-directory: frontend
        run: npm run lint:frontend

      - name: Skip frontend lint
        if: needs.changes.outputs.frontend != 'true' && needs.changes.outputs.contract != 'true' && !(github.event_name == 'pull_request' && github.base_ref == 'main')
        run: echo "No frontend or contract changes detected; skipping frontend lint."

  contract-checks:
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request' && (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.contract == 'true' || github.base_ref == 'main')
    needs:
      - changes
      - frontend-checkpoint
      - backend-tests
      - frontend-typecheck

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run backend contract checks
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_api_boundary_contracts.py tests/test_api_boundary_sessions.py tests/test_session_service.py tests/test_session_cli_tooling.py

      - name: Run frontend contract checks
        working-directory: frontend
        run: npm run test -- src/bridge/contract.success.test.ts src/bridge/contract.errors.test.ts src/bridge/contract.session-snapshot.test.ts src/bridge/transport.test.ts src/uiErrors.test.ts

  backend-typecheck:
    runs-on: ubuntu-24.04
    needs:
      - changes

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python typecheck dependencies
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.contract == 'true' || (github.event_name == 'pull_request' && github.base_ref == 'main')
        run: |
          python -m pip install --upgrade pip
          pip install -e .[typecheck]

      - name: Run backend typecheck
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.contract == 'true' || (github.event_name == 'pull_request' && github.base_ref == 'main')
        run: MYPYPATH=src mypy --explicit-package-bases src/alert_rules.py src/api/app.py src/api/routers/detectors.py src/api/routers/health.py src/api/routers/playback.py src/api/routers/sessions.py src/api/schemas.py src/session_io.py src/session_models.py src/session_runner.py src/session_service.py src/stream_loader_contracts.py

      - name: Skip backend typecheck
        if: needs.changes.outputs.backend != 'true' && needs.changes.outputs.contract != 'true' && !(github.event_name == 'pull_request' && github.base_ref == 'main')
        run: echo "No backend or contract changes detected; skipping backend typecheck."

  backend-pyright:
    runs-on: ubuntu-24.04
    continue-on-error: true
    needs:
      - changes

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python typecheck dependencies
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.contract == 'true' || (github.event_name == 'pull_request' && github.base_ref == 'main')
        run: |
          python -m pip install --upgrade pip
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/pip install -e .[typecheck]

      - name: Run backend pyright
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.contract == 'true' || (github.event_name == 'pull_request' && github.base_ref == 'main')
        run: .venv/bin/pyright --project pyrightconfig.json src/alert_rules.py src/api/app.py src/api/routers/detectors.py src/api/routers/health.py src/api/routers/playback.py src/api/routers/sessions.py src/api/schemas.py src/session_io.py src/session_models.py src/session_runner.py src/session_service.py src/stream_loader_contracts.py

      - name: Skip backend pyright
        if: needs.changes.outputs.backend != 'true' && needs.changes.outputs.contract != 'true' && !(github.event_name == 'pull_request' && github.base_ref == 'main')
        run: echo "No backend or contract changes detected; skipping backend pyright."

  feature-gate:
    runs-on: ubuntu-24.04
    if: always()
    needs:
      - frontend-checkpoint
      - backend-tests
      - frontend-typecheck
      - backend-typecheck
      - backend-ruff

    steps:
      - name: Verify required feature checks
        env:
          FRONTEND_CHECKPOINT_RESULT: ${{ needs.frontend-checkpoint.result }}
          BACKEND_TESTS_RESULT: ${{ needs.backend-tests.result }}
          FRONTEND_TYPECHECK_RESULT: ${{ needs.frontend-typecheck.result }}
          BACKEND_TYPECHECK_RESULT: ${{ needs.backend-typecheck.result }}
          BACKEND_RUFF_RESULT: ${{ needs.backend-ruff.result }}
        run: |
          set -eu
          for check in \
            "frontend-checkpoint:${FRONTEND_CHECKPOINT_RESULT}" \
            "backend-tests:${BACKEND_TESTS_RESULT}" \
            "frontend-typecheck:${FRONTEND_TYPECHECK_RESULT}" \
            "backend-typecheck:${BACKEND_TYPECHECK_RESULT}" \
            "backend-ruff:${BACKEND_RUFF_RESULT}"
          do
            name=${check%%:*}
            result=${check#*:}
            if [ "$result" != "success" ]; then
              echo "::error::Required feature check '$name' finished as '$result'"
              exit 1
          fi
          done
          echo "Feature branch gate passed."

  main-gate:
    runs-on: ubuntu-24.04
    if: always() && github.event_name == 'pull_request' && github.base_ref == 'main'
    needs:
      - feature-gate
      - main-pr-consistency
      - integration-smoke
      - contract-checks
      - test-and-build

    steps:
      - name: Verify required main checks
        env:
          FEATURE_GATE_RESULT: ${{ needs.feature-gate.result }}
          MAIN_PR_CONSISTENCY_RESULT: ${{ needs.main-pr-consistency.result }}
          INTEGRATION_SMOKE_RESULT: ${{ needs.integration-smoke.result }}
          CONTRACT_CHECKS_RESULT: ${{ needs.contract-checks.result }}
          TEST_AND_BUILD_RESULT: ${{ needs.test-and-build.result }}
        run: |
          set -eu
          for check in \
            "feature-gate:${FEATURE_GATE_RESULT}" \
            "main-pr-consistency:${MAIN_PR_CONSISTENCY_RESULT}" \
            "integration-smoke:${INTEGRATION_SMOKE_RESULT}" \
            "contract-checks:${CONTRACT_CHECKS_RESULT}" \
            "test-and-build:${TEST_AND_BUILD_RESULT}"
          do
            name=${check%%:*}
            result=${check#*:}
            if [ "$result" != "success" ]; then
              echo "::error::Required main check '$name' finished as '$result'"
              exit 1
            fi
          done
          echo "Main branch gate passed."

  test-and-build:
    runs-on: ubuntu-24.04
    needs:
      - changes
      - frontend-checkpoint
      - backend-tests
      - frontend-typecheck

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.contract == 'true' || needs.changes.outputs.backend == 'true' || (github.event_name == 'pull_request' && github.base_ref == 'main')
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install frontend dependencies
        if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.contract == 'true' || needs.changes.outputs.backend == 'true' || (github.event_name == 'pull_request' && github.base_ref == 'main')
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.contract == 'true' || needs.changes.outputs.backend == 'true' || (github.event_name == 'pull_request' && github.base_ref == 'main')
        working-directory: frontend
        run: npm run test

      - name: Build frontend
        if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.contract == 'true' || needs.changes.outputs.backend == 'true' || (github.event_name == 'pull_request' && github.base_ref == 'main')
        run: npm run build

      - name: Skip test and build
        if: needs.changes.outputs.frontend != 'true' && needs.changes.outputs.contract != 'true' && needs.changes.outputs.backend != 'true' && !(github.event_name == 'pull_request' && github.base_ref == 'main')
        run: echo "No backend, frontend, or contract changes detected; skipping full frontend validation."

  docs-consistency:
    if: github.event_name == 'pull_request' && github.base_ref != 'main' && (needs.changes.outputs.docs == 'true' || needs.changes.outputs.workflow == 'true' || needs.changes.outputs.contract == 'true')
    runs-on: ubuntu-24.04
    needs:
      - changes

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run docs and workflow consistency checks
        run: python .github/scripts/check_main_pr_consistency.py origin/${{ github.base_ref }}...HEAD

  integration-smoke:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-24.04
    needs:
      - frontend-checkpoint

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg=7:6.1.1-3ubuntu5

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]

      - name: Run integration smoke test
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_e2e_local_session.py
